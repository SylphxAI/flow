name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  risk-classification:
    name: risk-classification/pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: ADR-29 risk classification
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: classify
          policy-mode: observe

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  trunk-admission:
    name: trunk-admission/pass
    runs-on: ubuntu-latest
    needs:
      - risk-classification
      - ci
    if: ${{ !cancelled() }}
    steps:
      - name: ADR-29 trunk admission
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: fan-in
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}
